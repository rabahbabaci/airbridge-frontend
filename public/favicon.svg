<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Indigo rounded square (brand-primary #4F3FD3, 18% corner radius per iOS icon convention) -->
  <rect width="1024" height="1024" rx="184" fill="#4F3FD3"/>

  <!-- Lucide Plane glyph — primary element, ~55% of canvas, shifted
       slightly up-left so the bottom-right quadrant is clean space for
       the clock badge. Filled + stroked white for solid scalability. -->
  <g transform="translate(120 120) scale(22)">
    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"
          fill="#FFFFFF"
          stroke="#FFFFFF"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Lucide Clock badge — secondary element, ~33% of canvas, bottom-right.
       Thinner stroke (1.5 vs plane's effective ~1.2 fill+stroke) so the
       clock reads as subordinate. Both elements white on indigo, no
       nested bg circle — badge-style via position + scale hierarchy only. -->
  <g transform="translate(628 628) scale(14)">
    <circle cx="12" cy="12" r="10"
            fill="none"
            stroke="#FFFFFF"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    <polyline points="12 6 12 12 16 14"
              fill="none"
              stroke="#FFFFFF"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"/>
  </g>
</svg>
